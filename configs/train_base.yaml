# 基础训练配置
training:
  output_dir: "./outputs/models"
  num_epochs: 8
  batch_size: 1
  eval_batch_size: 1
  learning_rate: 0.00002
  warmup_ratio: 0.1
  max_input_length: 1024
  max_target_length: 512
  logging_steps: 50
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  gradient_accumulation_steps: 1
  fp16: false
  seed: 42

# 数据配置
data:
  data_paths:
    - "./outputs/fetaqa/predictions.json"
    - "./outputs/tabfact/predictions.json" 
    - "./outputs/wikitableqa/predictions.json"
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  max_samples: -1

# 模型配置
model:
  model_name: "Qwen/Qwen3-1.7B"
  tokenizer_name: "Qwen/Qwen3-1.7B"
  torch_dtype: "float32"

# 蒸馏配置
distillation:
  temperature: 2.0
  alpha: 0.7  # 蒸馏损失权重
  use_soft_labels: false

# 生成配置（推理时使用）
generation:
  max_new_tokens: 256
  temperature: 0.7
  top_p: 0.9
  do_sample: true