# 基础训练配置
model:
  model_name: "Qwen/Qwen3-1.7B"  # Instruct 版，支持 thinking；model card: 1.7B params, 28 layers, GQA
  tokenizer_name: "Qwen/Qwen3-1.7B"
  torch_dtype: "bfloat16"  # Model card 推荐 auto，但 bf16 高效（或 float16 for old GPU）
  device_map: "auto"
  low_cpu_mem_usage: true
  trust_remote_code: true  # Qwen3 需此，如果 transformers <4.51.0 会 error
  enable_thinking: true  # Model card 默认：启用 thinking mode for reasoning-heavy tasks like table QA

training:
  output_dir: "./outputs/models"
  num_epochs: 4
  batch_size: 1
  eval_batch_size: 1
  learning_rate: 0.00002
  warmup_ratio: 0.1
  max_input_length: 1024
  max_target_length: 512
  logging_steps: 50
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  gradient_accumulation_steps: 1
  bf16: true
  seed: 42

# 数据配置
data:
  data_paths:
    - "./outputs/fetaqa/predictions.json"
    - "./outputs/tabfact/predictions.json" 
    - "./outputs/wikitableqa/predictions.json"
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  max_samples: -1


# 蒸馏配置
distillation:
  temperature: 2.0
  alpha: 0.7  # 蒸馏损失权重
  use_soft_labels: false

# 生成配置（推理时使用）
generation:
  max_new_tokens: 32768  # Model card 推荐，默认输出长度
  temperature: 0.6  # Thinking mode
  top_p: 0.95
  top_k: 20
  min_p: 0
  do_sample: true
  repetition_penalty: 1.15
  presence_penalty: 1  # Model card: 减 repetitions (0-2 范围)
