# Qwen3 Agent 纠错蒸馏训练配置
# 用法: python3 scripts/train_distill.py --config configs/qwen3_agent.yaml

# 继承基础配置
_base_: "train_base.yaml"

model:
  model_name: "Qwen/Qwen3-1.7B"
  tokenizer_name: "Qwen/Qwen3-1.7B"
  local_path: "./origin/Qwen3-1.7B_origin"  # 如果有本地模型的话
  torch_dtype: "bfloat16"

data:
  dataset_type: "agent"  # 开启多轮纠错数据集加载模式（使用 AgentDataset）
  data_paths:
    - "outputs/wikitableqa/predictions_v2.json"
    - "outputs/hitab/predictions_v2.json"
    - "outputs/tabfact/predictions_v2.json"
    - "outputs/fetaqa/predictions_v2.json"

training:
  output_dir: "./outputs/models/Qwen3-1.7B-agent/"
  num_epochs: 3
  batch_size: 4
  eval_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 2e-5
  max_input_length: 2048
  max_target_length: 1024
  logging_steps: 10
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  bf16: true
  fp16: false
  gradient_checkpointing: true
  report_to: "tensorboard"
  use_lora: true
  lora_r: 64
  lora_alpha: 16
  lora_dropout: 0.1
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
