data:
  data_paths:
  - ./outputs/fetaqa/predictions.json
  - ./outputs/tabfact/predictions.json
  - ./outputs/wikitableqa/predictions.json
  max_samples: -1
  test_ratio: 0.1
  train_ratio: 0.8
  val_ratio: 0.1
distillation:
  alpha: 0.7
  temperature: 2.0
  use_soft_labels: false
generation:
  do_sample: true
  max_new_tokens: 256
  temperature: 0.7
  top_p: 0.9
model:
  model_name: Qwen/Qwen3-1.7B
  tokenizer_name: Qwen/Qwen3-1.7B
  torch_dtype: float32
training:
  batch_size: 1
  eval_batch_size: 1
  eval_steps: 500
  fp16: false
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-05
  logging_steps: 50
  max_input_length: 1024
  max_target_length: 512
  num_epochs: 8
  output_dir: ./outputs/models
  save_steps: 500
  save_total_limit: 3
  seed: 42
  warmup_ratio: 0.1
